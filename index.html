<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서식 자료실 | 신청서·보고서·계약서 무료 다운로드</title>
  <meta name="description" content="행정, 근로, 세금, 부동산, 의료, 법률, 교육 등 각종 서식과 양식을 공식 정부 사이트와 연결하여 무료로 제공합니다." />
  <meta property="og:title" content="서식 자료실 | 신청서·보고서·계약서 무료 다운로드" />
  <meta property="og:description" content="각종 행정서류, 계약서, 신청서를 공식 사이트에서 바로 받아보세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        공식 정부 사이트 연결
      </div>
      <h1>서식 자료실</h1>
      <p class="hero-desc">신청서 · 계약서 · 보고서 · 확인서<br>필요한 서류를 카테고리별로 빠르게 찾아보세요</p>

      <!-- Search Bar -->
      <div class="search-wrap">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="서식명, 용도를 검색하세요 (예: 근로계약서, 주민등록등본)" autocomplete="off" />
          <button class="search-clear" id="searchClear" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-item"><span class="stat-num" id="totalCount">0</span><span class="stat-label">총 서식</span></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">8</span><span class="stat-label">카테고리</span></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">무료</span><span class="stat-label">모두 무료</span></div>
      </div>
    </div>
  </header>

  <!-- Category Tabs -->
  <nav class="category-nav" id="categoryNav">
    <div class="category-scroll">
      <button class="cat-btn active" data-cat="all" id="cat-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        전체
      </button>
      <button class="cat-btn" data-cat="admin" id="cat-admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        행정·공공
      </button>
      <button class="cat-btn" data-cat="labor" id="cat-labor">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        근로·취업
      </button>
      <button class="cat-btn" data-cat="tax" id="cat-tax">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        세금·금융
      </button>
      <button class="cat-btn" data-cat="realestate" id="cat-realestate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 22V7l9-5 9 5v15H3z"/><path d="M9 22V12h6v10"/></svg>
        부동산
      </button>
      <button class="cat-btn" data-cat="health" id="cat-health">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        의료·복지
      </button>
      <button class="cat-btn" data-cat="legal" id="cat-legal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l3 13h12l3-13"/><path d="M15 6a3 3 0 0 0-6 0"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        법률·계약
      </button>
      <button class="cat-btn" data-cat="edu" id="cat-edu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        교육·자격
      </button>
      <button class="cat-btn" data-cat="business" id="cat-business">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        사업·창업
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">

    <!-- Result Info -->
    <div class="result-info" id="resultInfo">
      <span id="resultText">전체 서식</span>
      <span id="resultCount" class="result-badge">0개</span>
    </div>

    <!-- No Result -->
    <div class="no-result" id="noResult" style="display:none">
      <div class="no-result-icon">🔍</div>
      <p>검색 결과가 없습니다</p>
      <span>다른 키워드로 검색해보세요</span>
    </div>

    <!-- Cards Grid -->
    <div class="cards-grid" id="cardsGrid"></div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">📋 서식 자료실</div>
      <p class="footer-desc">본 사이트는 공식 정부 기관 및 공공 서비스 사이트로의 링크를 제공합니다.<br>서식의 정확성은 각 공식 기관에서 확인하시기 바랍니다.</p>
      <div class="footer-links">
        <a href="https://www.gov.kr" target="_blank" rel="noopener">정부24</a>
        <a href="https://www.law.go.kr" target="_blank" rel="noopener">국가법령정보센터</a>
        <a href="https://www.nts.go.kr" target="_blank" rel="noopener">국세청</a>
        <a href="https://www.moel.go.kr" target="_blank" rel="noopener">고용노동부</a>
      </div>
      <p class="footer-copy">© 2025 서식 자료실. 공공 정보 제공 목적의 비상업적 사이트입니다.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
